<svg width="200" height="200" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <style>
    rect { shape-rendering: crispEdges; }
  </style>

  <!-- Shadow -->
  <rect x="10" y="27" width="12" height="2" fill="#e5e7eb" />
  <rect x="12" y="26" width="8" height="2" fill="#e5e7eb" />

  <!-- Slime Character Group -->
  <g>
    <!-- Animation: Bouncing slightly up and down -->
    <animateTransform 
      attributeName="transform" 
      type="translate" 
      values="0,0; 0,1; 0,0" 
      dur="0.8s" 
      calcMode="discrete" 
      repeatCount="indefinite" />
    
    <!-- Dark Outline -->
    <rect x="12" y="16" width="8" height="2" fill="#14532d" />
    <rect x="10" y="18" width="2" height="2" fill="#14532d" />
    <rect x="20" y="18" width="2" height="2" fill="#14532d" />
    <rect x="8" y="20" width="2" height="6" fill="#14532d" />
    <rect x="22" y="20" width="2" height="6" fill="#14532d" />
    <rect x="10" y="26" width="12" height="2" fill="#14532d" />
    
    <!-- Base Color -->
    <rect x="12" y="18" width="8" height="8" fill="#22c55e" />
    <rect x="10" y="20" width="12" height="6" fill="#22c55e" />
    
    <!-- Highlight (Top Left) -->
    <rect x="12" y="18" width="6" height="2" fill="#4ade80" />
    <rect x="10" y="20" width="2" height="2" fill="#4ade80" />

    <!-- Left Eye -->
    <rect x="12" y="22" width="2" height="2" fill="#000000" />
    <rect x="12" y="22" width="1" height="1" fill="#ffffff" />
    
    <!-- Right Eye -->
    <rect x="18" y="22" width="2" height="2" fill="#000000" />
    <rect x="18" y="22" width="1" height="1" fill="#ffffff" />
  </g>
</svg>
